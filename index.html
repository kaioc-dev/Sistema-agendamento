<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSchedule | Agendamento Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="neon-text">CYBER<span>SCHEDULE</span></h1>
            <p>Sistema de Gerenciamento de Serviços</p>
        </header>

        <main>
            <section class="glass-card" id="booking-section">
                <h2 class="section-title"><i class="fas fa-calendar-plus"></i> Novo Agendamento</h2>
                <form id="appointment-form">
                    <div class="input-group">
                        <label>Serviço</label>
                        <select id="service" required>
                            <option value="" disabled selected>Selecione o serviço</option>
                            <option value="Manutenção de Celular">Manutenção de Celular</option>
                            <option value="Reparo de Software">Reparo de Software</option>
                            <option value="Limpeza Técnica">Limpeza Técnica</option>
                        </select>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Data</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="input-group">
                            <label>Horário</label>
                            <input type="time" id="time" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Seu Nome</label>
                        <input type="text" id="client-name" placeholder="Ex: Kaio César" required>
                    </div>

                    <button type="submit" class="btn-neon">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        CONFIRMAR AGENDAMENTO
                    </button>
                </form>
            </section>

            <section class="glass-card" id="admin-section">
                <h2 class="section-title"><i class="fas fa-list-ul"></i> Próximos Horários</h2>
                <div id="appointments-list" class="list-container">
                    </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Desenvolvido por Kaio César</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
